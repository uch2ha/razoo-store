name: razoo-store

services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    shm_size: 128m
    networks:
      - app

  backend:
    image: ghcr.io/uch2ha/razoo-store/backend:latest
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=20
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 768m
    networks:
      - app

  frontend:
    image: ghcr.io/uch2ha/razoo-store/frontend:latest
    depends_on:
      - backend
    restart: unless-stopped
    cpus: 0.15
    mem_limit: 128m
    networks:
      - app

  razoo-store-nginx:
    container_name: razoo-store-nginx
    image: ghcr.io/uch2ha/razoo-store/nginx:latest
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    cpus: 0.10
    mem_limit: 128m
    networks:
      - app
      - proxy

 
networks:
  app:
    internal: true
  proxy:
    external: true